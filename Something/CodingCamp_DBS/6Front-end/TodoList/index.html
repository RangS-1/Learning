<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <form id="form">
            <input type="text" id="title" placeholder="Add a new task..." required>
            <input type="date" id="date" required>
            <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>
    </div>

    <div class="container">
  <h2 class="container-header">Yang harus dilakukan</h2>
  
  <div class="list-item" id="todos">
  </div>
</div>

<div class="wrapper">
  <div class="container bg-white shadow" id="add-todo">
    <h2 class="container-header">Tambah Todo</h2>
    <form id="form">
      <input type="text" id="title" placeholder="Add a new task..." required>
      <input type="date" id="date" required>
      <button type="submit">Add</button>
    </form>
  </div>
  
<div class="wrapper">
  <div class="container">
    <h2 class="container-header">Yang sudah dilakukan</h2>
    <div class="list-item" id="completed-todos">
    </div>
  </div>
</div>
    <script src="script.js"></script>
</body>
</html>
